<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>取货凭证</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="topbar">
  <a href="index.html" class="back-btn">‹</a>
  <div class="topbar-title">取货凭证</div>
</div>

<div class="center-col page-pad-bottom" style="padding: 16px;">

  <div class="card" style="text-align: center; margin-bottom: 12px; background: #d1fae5;">
    <div style="font-size: 56px;">✅</div>
    <div style="font-size: 22px; font-weight: 800; color: #065f46; margin-top: 6px;">取货完成</div>
    <div style="color: #065f46; margin-top: 4px;" id="stamp"></div>
  </div>

  <!-- Printable slip -->
  <div class="card" id="slip" style="margin-bottom: 12px;"></div>

  <div style="display:flex; gap: 8px;">
    <button class="btn btn-ghost" style="flex:1;" onclick="window.print()">🖨️ 打印</button>
    <button class="btn btn-primary" style="flex:1;" onclick="alert('已生成 PDF 并发送至客户邮箱')">📧 发送 PDF</button>
  </div>
</div>

<div class="action-bar">
  <a href="index.html" class="btn btn-ghost">返回首页</a>
  <a href="pickup-search.html" class="btn btn-primary">继续下一单</a>
</div>

<script src="data.js"></script>
<script>
const id = new URLSearchParams(location.search).get('id');
const state = loadState();
const order = state.orders.find(o => o.id === id);

if (order && order.pickup) {
  const t = new Date(order.pickup.at);
  const tStr = t.getFullYear() + '-' +
    String(t.getMonth()+1).padStart(2,'0') + '-' +
    String(t.getDate()).padStart(2,'0') + ' ' +
    String(t.getHours()).padStart(2,'0') + ':' +
    String(t.getMinutes()).padStart(2,'0');
  document.getElementById('stamp').textContent = tStr;

  document.getElementById('slip').innerHTML = `
    <div style="text-align:center; border-bottom: 2px solid #111827; padding-bottom: 10px; margin-bottom: 14px;">
      <div style="font-weight: 800; font-size: 20px;">玻璃厂取货凭证</div>
      <div style="font-size: 12px; color:#6b7280; margin-top: 2px;">Pickup Slip</div>
    </div>

    <div style="display:grid; grid-template-columns: auto 1fr; gap: 8px 14px; font-size: 14px;">
      <div style="color:#6b7280;">订单号</div><div style="font-weight: 700;">#${order.id}</div>
      <div style="color:#6b7280;">公司</div><div>${order.company}</div>
      <div style="color:#6b7280;">项目</div><div>${order.project}</div>
      <div style="color:#6b7280;">总片数</div><div>${order.totalPieces}</div>
      <div style="color:#6b7280;">取货人</div><div style="font-weight: 700;">${order.pickup.name}</div>
      <div style="color:#6b7280;">联系电话</div><div>${order.pickup.phone || '—'}</div>
      <div style="color:#6b7280;">取货时间</div><div>${tStr}</div>
    </div>

    <div style="margin-top: 16px; padding-top: 12px; border-top: 1px dashed #e5e7eb;">
      <div style="font-size: 12px; color:#6b7280; margin-bottom: 6px;">客户签名</div>
      <img src="${order.pickup.signature}" style="width: 100%; max-height: 180px; object-fit: contain; background: #fafafa; border-radius: 8px;">
    </div>

    <div style="margin-top: 14px; text-align: center; font-size: 11px; color: #9ca3af;">
      本凭证由玻璃厂订单系统自动生成 · 双方确认即生效
    </div>
  `;
} else {
  document.getElementById('slip').textContent = '订单或取货记录不存在';
}
</script>

<style>
@media print {
  .topbar, .action-bar { display: none !important; }
  body { background: white; }
  .card { box-shadow: none; border: 1px solid #111827; }
}
</style>
</body>
</html>
