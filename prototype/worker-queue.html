<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>工人 · 我的活</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="topbar">
  <a href="index.html" class="back-btn">‹</a>
  <div class="topbar-title">我的工位</div>
</div>

<div class="center-col page-pad-bottom" style="padding: 16px;">

  <!-- Stage selector -->
  <div class="card" style="padding: 12px; margin-bottom: 12px;">
    <div style="font-size: 12px; color: #6b7280; margin-bottom: 6px;">我负责的工序</div>
    <div style="display:flex; gap: 6px;">
      <button class="stage-btn btn tap" data-stage="cut" style="flex:1; padding: 10px;">✂️ 切玻璃</button>
      <button class="stage-btn btn tap" data-stage="edge" style="flex:1; padding: 10px;">🔧 开切口</button>
      <button class="stage-btn btn tap" data-stage="tempered" style="flex:1; padding: 10px;">🔥 钢化</button>
    </div>
  </div>

  <!-- Rework highlight banner (appears only for cut stage) -->
  <div id="rework-banner"></div>

  <!-- Orders list -->
  <div style="font-weight: 700; margin-bottom: 8px; padding: 0 4px;" id="list-title">本工位待做的订单</div>
  <div id="list"></div>
</div>

<script src="data.js"></script>
<script>
let currentStage = 'cut';

function setStage(stage) {
  currentStage = stage;
  document.querySelectorAll('.stage-btn').forEach(b => {
    const on = b.dataset.stage === stage;
    b.className = 'stage-btn btn tap ' + (on ? 'btn-primary' : 'btn-ghost');
  });
  render();
}

function render() {
  const state = loadState();
  const banner = document.getElementById('rework-banner');
  const listEl = document.getElementById('list');

  // Rework banner: always visible across all stages so the alert isn't missed
  const reworkList = [];
  state.orders.forEach(o => {
    o.pieces.forEach(p => {
      if (p.rework) reworkList.push({ order: o, piece: p });
    });
  });
  if (reworkList.length > 0) {
    banner.innerHTML = `
      <div class="card" style="background:#fee2e2; color:#991b1b; margin-bottom:12px; animation: pulse 1.4s infinite;">
        <div style="font-weight: 700; font-size: 16px;">🔴 ${reworkList.length} 片紧急补切（切玻璃工位处理）</div>
        <div style="font-size: 13px; margin-top: 6px;">
          ${reworkList.map(r => `<a href="worker-pieces.html?id=${r.order.id}&stage=cut" style="color:#991b1b; display:inline-block; margin-right:10px; text-decoration: underline;">#${r.order.id} 第${r.piece.n}片</a>`).join('')}
        </div>
      </div>`;
  } else {
    banner.innerHTML = '';
  }

  // Orders that have pieces for this stage
  const orders = state.orders.filter(o => {
    if (o.status === 'picked_up') return false;
    return piecesForStage(o, currentStage).length > 0;
  });

  if (orders.length === 0) {
    listEl.innerHTML = '<div class="card" style="text-align:center; color:#9ca3af; padding: 40px;">✨ 本工位暂无待做任务</div>';
    return;
  }

  // Group by company for easier scanning
  const byCompany = {};
  orders.forEach(o => {
    if (!byCompany[o.company]) byCompany[o.company] = [];
    byCompany[o.company].push(o);
  });

  listEl.innerHTML = Object.entries(byCompany).map(([company, list]) => `
    <div style="margin-bottom: 14px;">
      <div style="font-size: 13px; color:#6b7280; padding: 4px 4px 6px;">${company}</div>
      <div class="card" style="padding: 0; overflow: hidden;">
        ${list.map(o => {
          const forStage = piecesForStage(o, currentStage);
          const pending = forStage.filter(p => p.stageStatus !== 'done').length;
          const reworkHere = forStage.filter(p => p.rework).length;
          return `
            <a class="row" href="worker-pieces.html?id=${o.id}&stage=${currentStage}" style="flex-direction: column; align-items: stretch;">
              <div style="display:flex; align-items:center; gap: 10px;">
                <div style="flex:1;">
                  <div class="row-title">
                    #${o.id}
                    ${o.priority === 'rush' ? '<span class="badge badge-rush" style="margin-left:6px;">🔥</span>' : ''}
                    ${reworkHere > 0 ? `<span class="badge badge-rework" style="margin-left:6px;">🔴 ${reworkHere}补</span>` : ''}
                  </div>
                  <div class="row-sub">${o.project}</div>
                </div>
                <div style="text-align:right;">
                  <div style="font-size: 20px; font-weight: 800; color: ${pending === 0 ? '#059669' : '#d97706'};">${pending}</div>
                  <div style="font-size: 11px; color:#6b7280;">待做</div>
                </div>
              </div>
            </a>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

document.querySelectorAll('.stage-btn').forEach(b => {
  b.addEventListener('click', () => setStage(b.dataset.stage));
});
setStage('cut');
</script>
</body>
</html>
