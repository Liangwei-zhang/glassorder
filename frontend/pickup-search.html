<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Pickup</title>
<link rel="stylesheet" href="shared.css?v=20260609-pickup-hold-release">
</head>
<body>
<div class="topbar">
  <a href="pickup-batches.html" class="back-btn">‹</a>
  <div class="topbar-title" data-i18n="pickupTitle">客户取货</div>
  <button class="logout-btn" onclick="logout()" data-i18n="logout">退出</button>
</div>

<div class="content-shell action-space">
  <div class="pickup-stepper" id="pickupStepper"></div>
  <div class="card flow-card pickup-po-card">
    <label class="form-label" for="poSearch" data-i18n="pickupPoSearchLabel">输入 PO</label>
    <div class="pickup-po-search-row">
      <input class="form-input" id="poSearch" type="search" autocomplete="off" data-i18n-placeholder="pickupPoSearchPlaceholder" placeholder="如: PO 546 / 10698">
      <button class="btn btn-primary" id="poSearchBtn" type="button" onclick="searchPickupPo(event)" data-i18n="searchPoBtn">查找</button>
    </div>
    <div class="row-sub pickup-po-meta" id="poSearchMeta"></div>
  </div>
  <div class="card flow-card">
    <label class="form-label" data-i18n="selectCustomer">选择客户</label>
    <div id="customerPicker"></div>
  </div>
  <div id="available"></div>
  <div class="card signature-card" id="signatureCard" style="display:none;">
    <div class="pickup-signature-intro" id="signatureIntro"></div>
    <label class="form-label" data-i18n="signerName">取货人姓名</label>
    <input class="form-input" id="name" data-i18n-placeholder="signerNamePh" placeholder="如: 张师傅">
    <label class="form-label" style="margin-top:12px;" data-i18n="contactPhone">联系电话</label>
    <input class="form-input" id="phone" data-i18n-placeholder="signerPhonePh" placeholder="可选">
    <label class="form-label" style="margin-top:12px;" data-i18n="customerSignOptional">客户签名（可选）</label>
    <canvas id="sig" class="sig-pad" style="margin-top:8px; height:180px;"></canvas>
    <button class="btn btn-ghost" type="button" onclick="clearSig()" style="margin-top:8px; min-height:0; padding:8px 12px;" data-i18n="clearSig">清空</button>
  </div>
</div>

<div class="action-bar">
  <a class="btn btn-ghost back" href="pickup-batches.html" data-i18n="back">返回</a>
  <button class="btn btn-success" id="submitBtn" onclick="submitBatch(event)">
    <span id="selectedSummary" data-i18n="pickupConfirmBtn">确认取货</span>
  </button>
</div>

<script src="js/api.js?v=20260609-pickup-hold-release"></script>
<script src="js/i18n.js?v=20260609-pickup-hold-release"></script>
<script>
const allowed = requireRolePage('boss');
const params = new URLSearchParams(location.search);
const initialCustomerId = params.get('customer_id');
const initialOrderId = params.get('order_id');
const initialPo = params.get('po') || '';
let customers = [];
let grouped = [];
let selected = new Set();
let signatureEmpty = true;
let customerPicker = null;
let pendingInitialOrder = null;
let orderFilterId = initialOrderId || '';
let activePoFilter = '';
let activePoCustomerId = '';
let lastHadPieces = false;
let lastCustomerId = '';

async function loadCustomers() {
  const [customerData, orderData] = await Promise.all([
    api('/api/customers'),
    initialOrderId ? api('/api/orders/' + encodeURIComponent(initialOrderId)) : Promise.resolve(null),
  ]);
  pendingInitialOrder = orderData && orderData.order ? orderData.order : null;
  const targetCustomerId = pendingInitialOrder ? pendingInitialOrder.customer_id : initialCustomerId;
  const backHref = pendingInitialOrder ? `boss-order-detail.html?id=${pendingInitialOrder.id}` : 'pickup-batches.html';
  document.querySelectorAll('.back-btn, .action-bar .back').forEach((el) => { el.href = backHref; });
  customers = customerData.customers;
  customerPicker.setCustomers(customers);
  if (initialPo && !pendingInitialOrder) {
    document.getElementById('poSearch').value = initialPo;
    await applyPickupPo(initialPo, { replaceUrl: false, silent: true });
  } else if (targetCustomerId && customers.some(c => String(c.id) === String(targetCustomerId))) customerPicker.select(targetCustomerId);
  else if (customers.length) customerPicker.select(customers[0].id);
  else document.getElementById('available').innerHTML = emptyState(t('customersEmpty'));
}

function updatePoSearchMeta(message = '') {
  const meta = document.getElementById('poSearchMeta');
  if (!meta) return;
  meta.textContent = message;
  meta.classList.toggle('active', Boolean(message));
}

async function applyPickupPo(raw, { replaceUrl = true, silent = false } = {}) {
  const po = String(raw || '').trim();
  if (!po) {
    clearPickupPo();
    return;
  }
  updatePoSearchMeta(t('loading'));
  const data = await api('/api/orders?po=' + encodeURIComponent(po) + '&include_archived=1&limit=5');
  const orders = data.orders || [];
  const order = orders.find((row) => !row.archived_at) || orders[0];
  if (!order) {
    activePoFilter = po;
    activePoCustomerId = '';
    grouped = [];
    updatePoSearchMeta(tn('pickupPoNotFound', { po }));
    renderAvailable();
    if (!silent) toast(tn('pickupPoNotFound', { po }), { type: 'danger' });
    return;
  }
  activePoFilter = order.order_number || po;
  activePoCustomerId = String(order.customer_id || '');
  orderFilterId = String(order.id);
  document.getElementById('poSearch').value = activePoFilter;
  updatePoSearchMeta(tn('pickupPoMatched', {
    po: orderCodeText(order),
    company: order.company || '',
  }));
  if (replaceUrl) {
    history.replaceState(null, '', 'pickup-search.html?po=' + encodeURIComponent(activePoFilter));
  }
  const customerId = order.customer_id;
  if (customerId && customers.some(c => String(c.id) === String(customerId))) {
    customerPicker.select(customerId);
  } else {
    await loadAvailable();
  }
}

async function searchPickupPo(ev) {
  const btn = ev && ev.currentTarget;
  await withBusy(btn, async () => {
    await applyPickupPo(document.getElementById('poSearch').value);
  });
}

function clearPickupPo() {
  activePoFilter = '';
  activePoCustomerId = '';
  orderFilterId = '';
  document.getElementById('poSearch').value = '';
  updatePoSearchMeta('');
  const id = customerPicker ? customerPicker.getValue() : '';
  if (id) history.replaceState(null, '', 'pickup-search.html?customer_id=' + encodeURIComponent(id));
  loadAvailable().catch(e => toast(e.message, { type:'danger' }));
}

async function loadAvailable() {
  selected.clear();
  signatureEmpty = true;
  clearSig();
  updatePickupFlow();
  const id = customerPicker ? customerPicker.getValue() : '';
  lastCustomerId = String(id || '');
  if (!id) {
    document.getElementById('available').innerHTML = emptyState(t('customersEmpty'));
    return;
  }
  const query = new URLSearchParams({ customer_id: id });
  query.set('include_hold', '1');
  if (activePoFilter) query.set('po', activePoFilter);
  const data = await api('/api/pickups/available?' + query.toString());
  grouped = data.orders || [];
  renderAvailable();
}

function renderAvailable() {
  const el = document.getElementById('available');
  if (!grouped.length) {
    el.innerHTML = emptyState(activePoFilter ? tn('pickupPoNoAvailable', { po: activePoFilter }) : t('pickupEmpty'));
    return;
  }
  const initialOrderIdNum = Number(orderFilterId || 0);
  const filteredGroups = initialOrderIdNum ? grouped.filter(order => Number(order.order_id) === initialOrderIdNum) : grouped;
  if (initialOrderIdNum && !filteredGroups.length) {
    el.innerHTML = errorState(t('pickupOrderUnavailable'), t('viewCustomerAllPickupPieces'), () => {
      orderFilterId = '';
      activePoFilter = '';
      document.getElementById('poSearch').value = '';
      updatePoSearchMeta('');
      history.replaceState(null, '', 'pickup-search.html?customer_id=' + encodeURIComponent(customerPicker.getValue()));
      renderAvailable();
    });
    return;
  }
  const visiblePieceIds = visiblePickupPieceIds(filteredGroups);
  const heldTotal = filteredGroups.reduce((sum, order) => sum + (order.pieces || []).filter((piece) => piece.hold).length, 0);
  const disabledAttr = (disabled) => disabled ? 'disabled style="opacity:.5;"' : '';
  el.innerHTML = `
    <div class="pickup-customer-hold-bar">
      <div class="pickup-customer-hold-copy">
        <div class="row-title">${esc(t('pickupCustomerHoldTitle'))}</div>
        <div class="row-sub">${esc(tn('pickupAvailabilitySummary', { ready: visiblePieceIds.length, hold: heldTotal }))}</div>
      </div>
      <div class="pickup-customer-hold-actions">
        <button class="btn btn-warn btn-inline-compact" type="button" ${disabledAttr(visiblePieceIds.length === 0)} onclick="holdPickupCustomer(true, event)">${esc(t('holdCustomerPickupBtn'))}</button>
        <button class="btn btn-ghost btn-inline-compact" type="button" ${disabledAttr(heldTotal === 0)} onclick="holdPickupCustomer(false, event)">${esc(t('unholdCustomerPickupBtn'))}</button>
      </div>
    </div>
    <div class="pickup-bulk-actions">
      <button class="btn btn-ghost" id="pickupSelectAllBtn" type="button" ${disabledAttr(visiblePieceIds.length === 0)} onclick="selectAllPickupVisible()">${esc(t('selectAll'))}</button>
      <button class="btn btn-ghost" id="pickupClearAllBtn" type="button" ${disabledAttr(selected.size === 0)} onclick="clearPickupSelection()">${esc(t('clearSelection'))}</button>
    </div>
    ${filteredGroups.map(order => {
      const pieces = order.pieces || [];
      const selectable = pieces.filter((piece) => !piece.hold);
      const heldCount = pieces.length - selectable.length;
      return `
    <div class="card pickup-order-panel flow-card" data-pickup-order="${order.order_id}">
      <div class="pickup-order-head">
        <div style="flex:1; min-width:0;">
          <div class="row-title">${esc(orderCodeText(order))}</div>
          <div class="row-sub">${esc(order.project_name || '')} · ${esc(tn('piecesShortN', { n: selectable.length }))}${heldCount ? ` · ${esc(tn('pickupHoldPiecesN', { n: heldCount }))}` : ''}</div>
        </div>
        <div class="pickup-order-actions">
          <button class="btn btn-ghost btn-inline-compact" type="button" ${disabledAttr(selectable.length === 0)} onclick="selectPickupOrder(${order.order_id})">${esc(t('selectAll'))}</button>
          <button class="btn btn-ghost btn-inline-compact" type="button" onclick="clearPickupOrder(${order.order_id})">${esc(t('clearSelection'))}</button>
          <button class="btn btn-warn btn-inline-compact" type="button" ${disabledAttr(selectable.length === 0)} onclick="holdPickupOrder(${order.order_id}, true, event)">${esc(t('holdOrderPickupBtn'))}</button>
          <button class="btn btn-ghost btn-inline-compact" type="button" ${disabledAttr(heldCount === 0)} onclick="holdPickupOrder(${order.order_id}, false, event)">${esc(t('unholdOrderPickupBtn'))}</button>
        </div>
      </div>
      ${pieces.map(p => `
        <label class="row" style="cursor:${p.hold ? 'not-allowed' : 'pointer'}; ${p.hold ? 'opacity:.68;' : ''}">
          <input type="checkbox" data-piece="${p.id}" data-order="${order.order_id}" ${selected.has(Number(p.id)) && !p.hold ? 'checked' : ''} ${p.hold ? 'disabled' : ''} onchange="togglePiece(${p.id}, this.checked)" style="accent-color:var(--accent);">
          <div style="flex:1;">
            <div class="row-title">${esc(tn('pieceN', { n: p.piece_no }))}${p.hold ? ` <span class="badge badge-warn pickup-hold-badge">${esc(t('pickupHoldState'))}</span>` : ''}</div>
            <div class="row-sub">${esc(p.size || '')} · ${esc(p.thickness || '')} ${esc(p.type || '')}${p.hold ? ` · ${esc(t('pickupHoldState'))}` : ''}</div>
          </div>
        </label>`).join('')}
    </div>`;
    }).join('')}`;
  updatePickupFlow();
}

function visiblePickupGroups() {
  const initialOrderIdNum = Number(orderFilterId || 0);
  return initialOrderIdNum ? grouped.filter(order => Number(order.order_id) === initialOrderIdNum) : grouped;
}

function visiblePickupPieceIds(groups = visiblePickupGroups()) {
  return groups.flatMap((order) => (order.pieces || [])
    .filter((piece) => !piece.hold)
    .map((piece) => Number(piece.id)));
}

function pickupPieceById(id) {
  const target = Number(id);
  for (const order of grouped) {
    const piece = (order.pieces || []).find((row) => Number(row.id) === target);
    if (piece) return piece;
  }
  return null;
}

function syncPickupChecks() {
  document.querySelectorAll('[data-piece]').forEach((input) => {
    const piece = pickupPieceById(input.dataset.piece);
    if (piece && piece.hold) selected.delete(Number(input.dataset.piece));
    input.disabled = Boolean(piece && piece.hold);
    input.checked = !(piece && piece.hold) && selected.has(Number(input.dataset.piece));
  });
}

function updatePickupBulkButtons() {
  const visibleIds = visiblePickupPieceIds();
  const selectAllBtn = document.getElementById('pickupSelectAllBtn');
  const clearAllBtn = document.getElementById('pickupClearAllBtn');
  if (selectAllBtn) {
    selectAllBtn.disabled = visibleIds.length === 0 || visibleIds.every((id) => selected.has(Number(id)));
    selectAllBtn.style.opacity = selectAllBtn.disabled ? '.5' : '';
  }
  if (clearAllBtn) {
    clearAllBtn.disabled = selected.size === 0;
    clearAllBtn.style.opacity = clearAllBtn.disabled ? '.5' : '';
  }
}

function togglePiece(id, on) {
  const piece = pickupPieceById(id);
  if (piece && piece.hold) {
    selected.delete(Number(id));
    syncPickupChecks();
    updatePickupFlow();
    return;
  }
  if (on) selected.add(Number(id));
  else selected.delete(Number(id));
  syncPickupChecks();
  updatePickupFlow();
  if (selected.size > 0 && !lastHadPieces) {
    lastHadPieces = true;
    requestAnimationFrame(() => {
      const target = document.getElementById('signatureCard');
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  } else if (!selected.size) {
    lastHadPieces = false;
  }
}

function selectPickupIds(ids) {
  ids.filter((id) => { const piece = pickupPieceById(id); return !piece || !piece.hold; }).forEach((id) => selected.add(Number(id)));
  lastHadPieces = selected.size > 0;
  syncPickupChecks();
  updatePickupFlow();
}

function clearPickupIds(ids) {
  ids.forEach((id) => selected.delete(Number(id)));
  lastHadPieces = selected.size > 0;
  syncPickupChecks();
  updatePickupFlow();
}

function selectAllPickupVisible() {
  selectPickupIds(visiblePickupPieceIds());
}

function clearPickupSelection() {
  selected.clear();
  lastHadPieces = false;
  syncPickupChecks();
  updatePickupFlow();
}

function selectPickupOrder(orderId) {
  const order = grouped.find((row) => Number(row.order_id) === Number(orderId));
  selectPickupIds(order ? (order.pieces || []).filter((piece) => !piece.hold).map((piece) => piece.id) : []);
}

function clearPickupOrder(orderId) {
  const order = grouped.find((row) => Number(row.order_id) === Number(orderId));
  clearPickupIds(order ? (order.pieces || []).map((piece) => piece.id) : []);
}


async function holdPickupOrder(orderId, hold, ev) {
  const ok = await confirmModal({
    title: hold ? t('holdOrderPickupConfirm') : t('unholdOrderPickupConfirm'),
    body: hold ? t('holdOrderPickupBody') : t('unholdPickupBody'),
    confirmText: hold ? t('holdOrderPickupBtn') : t('unholdOrderPickupBtn'),
  });
  if (!ok) return;
  const btn = ev && ev.currentTarget;
  await withBusy(btn, async () => {
    const data = await api('/api/pickups/hold-order', {
      method: 'POST',
      body: { order_id: Number(orderId), hold },
    });
    toast(tn(hold ? 'pickupHoldAppliedN' : 'pickupHoldReleasedN', { n: data.changed }), { type: 'success' });
    await loadAvailable();
  });
}

async function holdPickupCustomer(hold, ev) {
  const customerId = customerPicker ? customerPicker.getValue() : '';
  if (!customerId) return;
  const ok = await confirmModal({
    title: hold ? t('holdCustomerPickupConfirm') : t('unholdCustomerPickupConfirm'),
    body: hold ? t('holdCustomerPickupBody') : t('unholdPickupBody'),
    confirmText: hold ? t('holdCustomerPickupBtn') : t('unholdCustomerPickupBtn'),
  });
  if (!ok) return;
  const btn = ev && ev.currentTarget;
  await withBusy(btn, async () => {
    const data = await api('/api/pickups/hold-customer', {
      method: 'POST',
      body: { customer_id: Number(customerId), hold },
    });
    toast(tn(hold ? 'pickupHoldAppliedN' : 'pickupHoldReleasedN', { n: data.changed }), { type: 'success' });
    await loadAvailable();
  });
}

function updatePickupFlow() {
  const hasCustomer = Boolean(customerPicker && customerPicker.getValue());
  const hasPieces = selected.size > 0;
  const hasSignerName = Boolean(document.getElementById('name').value.trim());
  const steps = [
    { number: 1, label: t('pickupStepLookup'), done: hasCustomer },
    { number: 2, label: t('pickupStepPieces'), done: hasPieces },
    { number: 3, label: t('pickupStepConfirm'), done: hasPieces && hasSignerName },
  ];
  steps.forEach((step, index) => {
    step.active = !step.done && ((index === 0 && !hasCustomer) || (index === 1 && hasCustomer && !hasPieces) || (index === 2 && hasPieces));
  });
  const note = selected.size ? tn('pickupSelectedHintN', { n: selected.size }) : '';
  const stepper = document.getElementById('pickupStepper');
  stepper.classList.toggle('with-note', selected.size > 0);
  stepper.innerHTML = renderPickupSteps(steps, note);
  document.getElementById('signatureCard').style.display = hasPieces ? '' : 'none';
  const intro = document.getElementById('signatureIntro');
  if (intro) {
    intro.textContent = hasPieces
      ? tn('pickupSignatureOptionalHintN', { n: selected.size })
      : '';
  }
  const summary = document.getElementById('selectedSummary');
  if (summary) {
    summary.textContent = selected.size ? tn('pickupSelectedConfirmN', { n: selected.size }) : t('pickupConfirmBtn');
  }
  updatePickupBulkButtons();
}

const canvas = document.getElementById('sig');
const ctx = canvas.getContext('2d');
let drawing = false, last = null;
function resizeCanvas() {
  const ratio = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  if (!w || !h) return;
  canvas.width = w * ratio;
  canvas.height = h * ratio;
  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = '#18181b';
  ctx.lineCap = 'round';
}
function pos(e) {
  const r = canvas.getBoundingClientRect();
  const t = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}
function start(e) {
  drawing = true;
  last = pos(e);
  if (canvas.setPointerCapture && e.pointerId !== undefined) {
    try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
  }
  e.preventDefault();
}
function move(e) {
  if (!drawing) return;
  const p = pos(e);
  ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(p.x, p.y); ctx.stroke();
  last = p; signatureEmpty = false; updatePickupFlow(); e.preventDefault();
}
function end(e) {
  drawing = false;
  last = null;
  if (canvas.releasePointerCapture && e && e.pointerId !== undefined) {
    try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
  }
}
function clearSig() { ctx.clearRect(0, 0, canvas.width, canvas.height); signatureEmpty = true; updatePickupFlow(); }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
canvas.addEventListener('pointerdown', start);
canvas.addEventListener('pointermove', move);
canvas.addEventListener('pointerup', end);
canvas.addEventListener('pointercancel', end);
canvas.addEventListener('pointerleave', end);
canvas.addEventListener('mousedown', start);
canvas.addEventListener('mousemove', move);
canvas.addEventListener('mouseup', end);
canvas.addEventListener('mouseleave', end);
canvas.addEventListener('touchstart', start, { passive:false });
canvas.addEventListener('touchmove', move, { passive:false });
canvas.addEventListener('touchend', end);
canvas.addEventListener('touchcancel', end);
document.getElementById('name').addEventListener('input', updatePickupFlow);
document.getElementById('poSearch').addEventListener('keydown', (event) => {
  if (event.key === 'Enter') {
    event.preventDefault();
    searchPickupPo({ currentTarget: document.getElementById('poSearchBtn') }).catch(err => toast(err.message, { type:'danger' }));
  } else if (event.key === 'Escape') {
    clearPickupPo();
  }
});

async function submitBatch(ev) {
  const name = document.getElementById('name').value.trim();
  if (!selected.size) return toast(t('selectFirst'), { type:'danger' });
  if (!name) return toast(t('sigEmptyName'), { type:'danger' });
  const ok = await confirmModal({
    title: tn('pickupConfirmTitle', { name }),
    body: tn('pickupBatchConfirmBody', { n: selected.size }),
    confirmText: t('pickupConfirmCta'),
  });
  if (!ok) return;
  const btn = ev && ev.currentTarget;
  await withBusy(btn, async () => {
    const body = {
      piece_ids: [...selected],
      signer_name: name,
      signer_phone: document.getElementById('phone').value.trim(),
    };
    if (!signatureEmpty) body.signature_base64 = canvas.toDataURL('image/png');
    const data = await api('/api/pickups/batches', {
      method: 'POST',
      body,
    });
    location.href = 'pickup-batch-detail.html?id=' + data.batch.id;
  });
}

function onLangChange() { renderAvailable(); updatePickupFlow(); }
if (allowed) {
  customerPicker = initCustomerPicker({
    root: '#customerPicker',
    customers: [],
    placeholder: t('customerSearchPlaceholder'),
    onSelect: (customer) => {
      if (String(customer.id) !== String(lastCustomerId)) {
        document.getElementById('name').value = '';
        document.getElementById('phone').value = '';
      }
      if (pendingInitialOrder && String(customer.id) !== String(pendingInitialOrder.customer_id)) {
        orderFilterId = '';
        activePoFilter = '';
        activePoCustomerId = '';
        document.getElementById('poSearch').value = '';
        updatePoSearchMeta('');
        history.replaceState(null, '', 'pickup-search.html?customer_id=' + encodeURIComponent(customer.id));
        document.querySelectorAll('.back-btn, .action-bar .back').forEach((el) => { el.href = 'pickup-batches.html'; });
      } else if (activePoFilter && activePoCustomerId && String(customer.id) !== String(activePoCustomerId)) {
        orderFilterId = '';
        activePoFilter = '';
        activePoCustomerId = '';
        document.getElementById('poSearch').value = '';
        updatePoSearchMeta('');
        history.replaceState(null, '', 'pickup-search.html?customer_id=' + encodeURIComponent(customer.id));
      }
      loadAvailable().catch(e => toast(e.message, { type:'danger' }));
    },
  });
  loadCustomers().catch(err => {
    document.getElementById('available').innerHTML = errorState(err.message, t('retry'), () => loadCustomers());
  });
  updatePickupFlow();
}
</script>
</body>
</html>
