<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Pickup Sign-off</title>
<link rel="stylesheet" href="shared.css?v=20260520-customer-quick">
</head>
<body>
<div class="topbar">
  <a href="pickup-search.html" class="back-btn">‹</a>
  <div class="topbar-title" data-i18n="pickupSignTitle">取货签字</div>
  <button class="logout-btn" onclick="logout()" data-i18n="logout">退出</button>
</div>

<div class="center-col page-pad-bottom" style="padding: 16px;">
  <div class="card" id="info" style="margin-bottom: 12px;"></div>

  <div class="card" style="margin-bottom: 12px;">
    <label class="form-label" data-i18n="signerName">取货人姓名</label>
    <input class="form-input" id="name" data-i18n-placeholder="signerNamePh" placeholder="如: 张师傅">

    <label class="form-label" style="margin-top: 14px;" data-i18n="contactPhone">联系电话</label>
    <input class="form-input" id="phone" data-i18n-placeholder="signerPhonePh" placeholder="可选">
  </div>

  <div class="card">
    <div style="display:flex; justify-content: space-between; align-items: center;">
      <label class="form-label" style="margin:0;" data-i18n="customerSign">客户签名</label>
      <button class="btn btn-ghost" id="clearSigBtn" style="padding: 6px 12px; min-height: 0;" onclick="clearSig()" data-i18n="clearSig">清除</button>
    </div>
    <canvas id="sig" class="sig-pad" style="margin-top: 8px;"></canvas>
    <div style="font-size: 12px; color: var(--text-2); margin-top: 6px;" data-i18n="signHere">请在上方白色区域手写签名</div>
  </div>
</div>

<div class="action-bar">
  <a href="pickup-search.html" class="btn btn-ghost back" data-i18n="cancel">取消</a>
  <button class="btn btn-success" id="submitBtn" onclick="submitPickup()" data-i18n="pickupConfirmBtn">确认取货</button>
</div>

<script src="js/api.js?v=20260520-customer-quick"></script>
<script src="js/i18n.js?v=20260520-customer-quick"></script>
<script>
const allowed = requireRolePage('boss');
const id = new URLSearchParams(location.search).get('id');
let order = null;

async function loadOrder() {
  const data = await api('/api/orders/' + id);
  order = data.order;
  renderInfo();
}

function renderInfo() {
  if (!order) return;
  document.getElementById('info').innerHTML = `
    <div style="display:flex; align-items: center; gap: 14px;">
      <div style="display:flex; align-items:center; justify-content:center; width:44px; height:44px; background:var(--info-soft); border-radius:12px; flex-shrink:0;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="color:var(--info);" aria-hidden="true">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
          <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
      </div>
      <div style="flex:1;">
        <div style="font-size: 18px; font-weight: 700; letter-spacing:-0.01em;">#${esc(order.order_number)}</div>
        <div style="color:var(--text-2); margin-top: 2px; font-size: 13px;">${esc(order.company)} · ${esc(order.project_name || '')}</div>
      </div>
    </div>
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px;">
      <div class="stat-tile" style="background: var(--surface-2); box-shadow: none;">
        <div class="num-big" style="font-size: 16px;">${order.pieces.length}</div>
        <div class="num-label">${esc(t('totalPieces'))}</div>
      </div>
      <div class="stat-tile" style="background: var(--surface-2); box-shadow: none;">
        <div class="num-big" style="font-size: 14px;">${esc(order.deadline || t('notSet'))}</div>
        <div class="num-label">${esc(t('plannedDoneLabel'))}</div>
      </div>
      <div class="stat-tile" style="background: var(--surface-2); box-shadow: none;">
        <div class="num-big" style="font-size: 14px;">${esc(order.status === 'ready_pickup' ? t('pickupReadyState') : t('pickupNotReadyState'))}</div>
        <div class="num-label">${esc(t('statusWord'))}</div>
      </div>
    </div>`;
}

function onLangChange() { renderInfo(); }

const canvas = document.getElementById('sig');
const ctx = canvas.getContext('2d');
let drawing = false, last = null, signatureEmpty = true;
function resizeCanvas() {
  const previous = canvas.width && canvas.height ? canvas.toDataURL('image/png') : null;
  const ratio = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;
  if (!w || !h) return;
  canvas.width = w * ratio;
  canvas.height = h * ratio;
  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = '#18181b';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  if (previous && !signatureEmpty) {
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0, w, h);
    img.src = previous;
  }
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const t = (e.touches && e.touches[0]) ? e.touches[0]
    : (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0]
    : e;
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}
function start(e) {
  drawing = true;
  last = getPos(e);
  if (canvas.setPointerCapture && e.pointerId !== undefined) {
    try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
  }
  e.preventDefault();
}
function move(e)  {
  if (!drawing) return;
  const p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(last.x, last.y);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  last = p;
  signatureEmpty = false;
  e.preventDefault();
}
function end(e) {
  drawing = false;
  last = null;
  if (canvas.releasePointerCapture && e && e.pointerId !== undefined) {
    try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
  }
}
canvas.addEventListener('pointerdown', start);
canvas.addEventListener('pointermove', move);
canvas.addEventListener('pointerup', end);
canvas.addEventListener('pointercancel', end);
canvas.addEventListener('pointerleave', end);
canvas.addEventListener('mousedown', start);
canvas.addEventListener('mousemove', move);
canvas.addEventListener('mouseup', end);
canvas.addEventListener('mouseleave', end);
canvas.addEventListener('touchstart', start, { passive: false });
canvas.addEventListener('touchmove', move, { passive: false });
canvas.addEventListener('touchend', end);
canvas.addEventListener('touchcancel', end);

function clearSig() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  signatureEmpty = true;
}

function isEmpty() {
  if (signatureEmpty) return true;
  const d = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
  for (let i = 3; i < d.length; i += 4) if (d[i] !== 0) return false;
  return true;
}

async function submitPickup() {
  if (!order) return;
  const name = document.getElementById('name').value.trim();
  if (!name) return toast(t('sigEmptyName'), { type: 'danger' });
  if (isEmpty()) return toast(t('sigEmptySign'), { type: 'danger' });

  const ok = await confirmModal({
    title: tn('pickupConfirmTitle', { name }),
    body: tn('pickupConfirmBody', { n: order.order_number }),
    confirmText: t('pickupConfirmCta'),
  });
  if (!ok) return;

  const btn = document.getElementById('submitBtn');
  const clearBtn = document.getElementById('clearSigBtn');
  clearBtn.disabled = true;
  await withBusy(btn, async () => {
    btn.textContent = t('creatingSlip');
    try {
      await api('/api/orders/' + order.id + '/pickup', {
        method: 'POST',
        body: {
          signer_name: name,
          signer_phone: document.getElementById('phone').value.trim(),
          signature_base64: canvas.toDataURL('image/png'),
        },
      });
      location.href = 'pickup-slip.html?id=' + order.id;
    } catch (err) {
      toast(err.message, { type: 'danger' });
    }
  }).finally(() => {
    clearBtn.disabled = false;
  });
}

if (allowed) {
  loadOrder().catch(err => {
    document.getElementById('info').innerHTML = `<div style="color: var(--danger-text);">${esc(err.message)}</div>`;
  });
}
</script>
</body>
</html>
