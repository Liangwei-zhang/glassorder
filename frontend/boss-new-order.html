<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>New Order</title>
<link rel="stylesheet" href="shared.css?v=20260522-optional-signature">
</head>
<body>
<div class="topbar">
  <a href="boss-dashboard.html" class="back-btn">‹</a>
  <div class="topbar-title" data-i18n="newOrderTitle">新建订单</div>
  <button class="logout-btn" onclick="logout()" data-i18n="logout">退出</button>
</div>

<div class="center-col page-pad-bottom" style="padding: 16px;">
  <div class="card" style="margin-bottom: 12px;">
    <label class="form-label" data-i18n="customer">客户</label>
    <div id="customerPicker"></div>
    <a href="customers.html" style="display:inline-block; margin-top: 8px; font-size: 13px; color: var(--accent);" data-i18n="manageCustomers">管理客户</a>

    <label class="form-label" style="margin-top: 14px;" data-i18n="projectAddress">项目 / 地址</label>
    <input class="form-input" id="project" data-i18n-placeholder="projectPlaceholder" placeholder="留空时从 PDF 项目名自动带入">

    <div style="display:flex; gap: 10px; margin-top: 14px;">
      <div style="flex:1;">
        <label class="form-label" data-i18n="plannedDone">计划完工</label>
        <input class="form-input" id="deadline" type="date">
      </div>
      <div style="flex:1;">
        <label class="form-label" data-i18n="priority">优先级</label>
        <select class="form-select" id="priority">
          <option value="normal" data-i18n="priorityNormal">正常</option>
          <option value="rush" data-i18n="priorityRush">加急</option>
          <option value="rework" data-i18n="priorityRework">返工</option>
        </select>
      </div>
    </div>

    <label class="form-label" style="margin-top: 14px;" data-i18n="orderTemplate">订单类型</label>
    <select class="form-select" id="orderTemplate">
      <option value="glass" data-i18n="templateGlass">钢化玻璃（默认）</option>
      <option value="mirror" data-i18n="templateMirror">镜子（仅切）</option>
    </select>
  </div>

  <div class="card" style="margin-bottom: 12px;">
    <label class="form-label" data-i18n="drawingPdf">图纸 PDF</label>
    <label class="add-trigger" style="flex-direction: column; gap: 6px; padding: 22px;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
      </svg>
      <div id="fileLabel" data-i18n="pickPdfHint">点击选择 PDF</div>
      <div style="font-size:12px; color:var(--text-2); font-weight: 500;" data-i18n="pdfAutoParse">系统自动解析片数、尺寸并按页拆图</div>
      <input id="pdf" type="file" style="display:none;" accept="application/pdf,.pdf">
    </label>

    <label class="form-label" style="margin-top: 14px;" data-i18n="noteLabel">备注（可选）</label>
    <textarea class="form-textarea" id="note" rows="3" data-i18n-placeholder="notePlaceholder" placeholder="特殊要求、HOLD 片编号、客户嘱托等"></textarea>
  </div>
</div>

<div class="action-bar">
  <a href="boss-dashboard.html" class="btn btn-ghost back" data-i18n="cancel">取消</a>
  <button class="btn btn-primary" id="createBtn" onclick="createOrder()" data-i18n="publishOrder">发布到车间</button>
</div>

<script src="js/api.js?v=20260522-optional-signature"></script>
<script src="js/i18n.js?v=20260522-optional-signature"></script>
<script>
const pageAllowed = requireRolePage('boss');

const MAX_PDF_BYTES = 25 * 1024 * 1024;
let customerPicker = null;

async function loadCustomers() {
  const data = await api('/api/customers');
  customerPicker.setCustomers(data.customers || []);
  if (!data.customers.length) toast(t('addCustomerFirst'), { type: 'danger' });
}

document.getElementById('deadline').valueAsDate = new Date(Date.now() + 7 * 86400000);
document.getElementById('pdf').addEventListener('change', (e) => {
  const file = e.target.files[0];
  document.getElementById('fileLabel').textContent = file ? file.name : t('pickPdfHint');
});

async function createOrder() {
  const customerId = customerPicker ? customerPicker.getValue() : '';
  const file = document.getElementById('pdf').files[0];
  if (!customerId) return toast(t('pickCustomerFirst'), { type: 'danger' });
  if (!file) return toast(t('pickPdfFirst'), { type: 'danger' });
  if (file.size > MAX_PDF_BYTES) {
    return toast('PDF > 25MB', { type: 'danger' });
  }

  const btn = document.getElementById('createBtn');
  await withBusy(btn, async () => {
    btn.textContent = t('parsingUploading');
    try {
      const form = new FormData();
      form.append('customer_id', customerId);
      form.append('priority', document.getElementById('priority').value);
      form.append('deadline', document.getElementById('deadline').value);
      form.append('project_name', document.getElementById('project').value.trim());
      form.append('note', document.getElementById('note').value.trim());
      if (document.getElementById('orderTemplate').value === 'mirror') {
        form.append('default_required_steps', JSON.stringify(['cut']));
      }
      form.append('pdf', file);
      const data = await api('/api/orders', { method: 'POST', body: form });
      location.href = 'boss-order-detail.html?id=' + data.order.id;
    } catch (err) {
      toast(err.message, { type: 'danger' });
    }
  });
}

if (pageAllowed) {
  customerPicker = initCustomerPicker({
    root: '#customerPicker',
    customers: [],
    placeholder: t('customerSearchPlaceholder'),
  });
  loadCustomers().catch(err => {
    toast(err.message, { type: 'danger' });
  });
}
</script>
</body>
</html>
