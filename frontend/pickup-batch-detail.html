<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Pickup Batch</title>
<link rel="stylesheet" href="shared.css?v=20260521-worker-context-card">
</head>
<body>
<div class="topbar">
  <a href="pickup-batches.html" class="back-btn">‹</a>
  <div class="topbar-title" id="title" data-i18n="pickupBatchDetail">提货批次</div>
  <button class="logout-btn" onclick="logout()" data-i18n="logout">退出</button>
</div>

<div class="content-shell bottom-nav-space boss-shell">
  <div id="body"></div>
</div>

<script src="js/api.js?v=20260521-worker-context-card"></script>
<script src="js/i18n.js?v=20260521-worker-context-card"></script>
<script>
const pageAllowed = requireRolePage('boss');
if (pageAllowed) injectBossNav('pickup');
const id = new URLSearchParams(location.search).get('id');
let batch = null;

async function loadBatch() {
  const data = await api('/api/pickups/batches/' + id);
  batch = data.batch;
  render();
}

function groupedItems() {
  const map = new Map();
  for (const item of batch.items || []) {
    if (!map.has(item.order_id)) map.set(item.order_id, { order_number: item.order_number, project_name: item.project_name, items: [] });
    map.get(item.order_id).items.push(item);
  }
  return [...map.values()];
}

function batchStats() {
  const groups = groupedItems();
  const totalPieces = (batch.items || []).length;
  const revertedPieces = (batch.items || []).filter(item => item.reverted_at).length;
  return { groups, totalPieces, revertedPieces };
}

function render() {
  if (!batch) return;
  const stats = batchStats();
  document.getElementById('title').textContent = batch.batch_number;
  document.getElementById('body').innerHTML = `
    <div class="card flow-card">
      <div class="row-title">${esc(batch.company)}</div>
      <div class="row-sub">${esc(batch.signer_name)} · ${esc(batch.signer_phone || t('noPhone'))} · ${esc(relativeTime(batch.picked_at))}</div>
      ${renderStatCells([
        { value: stats.groups.length, label: t('ordersCount') },
        { value: stats.totalPieces, label: t('pickedPieces') },
        { value: stats.revertedPieces, label: t('revertedPieces'), tone: stats.revertedPieces ? 'danger' : '' },
      ], { className: 'metrics-grid batch-summary-grid' })}
      ${stats.revertedPieces ? `<div class="batch-status-note">${esc(tn('batchRevertedSummaryN', { n: stats.revertedPieces }))}</div>` : ''}
      <div style="display:flex; gap:8px; margin-top:12px;">
        <button class="btn btn-ghost" style="flex:1;" onclick="window.print()">${esc(t('printBtn'))}</button>
        <button class="btn btn-primary" style="flex:1;" onclick="downloadBatchSlip()">${esc(t('downloadPdfBtn'))}</button>
      </div>
    </div>
    ${stats.groups.map(group => `
      ${renderPanel({
        title: '#' + group.order_number,
        meta: tn('piecesShortN', { n: group.items.length }),
        body: `
        ${group.items.map(item => `
          <div class="row">
            <div style="flex:1;">
              <div class="row-title">${esc(tn('pieceN', { n: item.piece_no }))}</div>
              <div class="row-sub">${esc(item.size || '')} ${item.reverted_at ? '· ' + esc(t('reverted')) : ''}</div>
            </div>
            ${item.reverted_at ? `<span class="badge badge-rework">${esc(t('reverted'))}</span>` : `<button class="menu-trigger" type="button" onclick="pieceMenu(event, ${item.piece_id})" aria-label="more">⋯</button>`}
          </div>`).join('')}
        `,
        className: 'pickup-order-panel',
      })}`).join('')}
  `;
}

function pieceMenu(event, pieceId) {
  event.stopPropagation();
  popMenu(event.currentTarget, [
    { label: t('revert'), danger: true, onClick: () => revertPiece(pieceId) },
  ]);
}

async function downloadBatchSlip() {
  try {
    await openAuthFile(batch.slip_pdf_path);
  } catch (err) {
    toast(err.message, { type:'danger' });
  }
}

async function revertPiece(pieceId) {
  const reason = await promptModal({
    title: t('revertPickupConfirm'),
    body: t('revertBatchPieceBody'),
    placeholder: t('revertReasonPrompt'),
    confirmText: t('menuRevertPickup'),
    danger: true,
  });
  if (!reason) return;
  try {
    const data = await api('/api/pickups/batches/' + batch.id + '/revert', {
      method: 'POST',
      body: { piece_ids: [pieceId], reason },
    });
    batch = data.batch;
    render();
    toast(t('pickupReverted'), { type:'success' });
  } catch (err) {
    toast(err.message, { type:'danger' });
  }
}
function onLangChange() { render(); }
if (pageAllowed) {
  loadBatch().catch(err => {
    document.getElementById('body').innerHTML = errorState(err.message, t('retry'), loadBatch);
  });
}
</script>
<style>
@media print {
  .topbar, .bottom-nav, button { display:none !important; }
  body { background:white; }
  .card { box-shadow:none; border:1px solid var(--border-1); }
}
</style>
</body>
</html>
