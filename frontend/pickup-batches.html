<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Pickup Batches</title>
<link rel="stylesheet" href="shared.css?v=20260520-customer-quick">
</head>
<body>
<div class="topbar">
  <div class="topbar-title" data-i18n="navPickup">取货</div>
  <button class="logout-btn" onclick="logout()" data-i18n="logout">退出</button>
</div>

<div class="center-col boss-shell" style="padding:16px;">
  <div class="pickup-stats" id="stats"></div>
  <div class="pickup-list-title">
    <span data-i18n="pickupBatches">提货批次</span>
    <span id="batchCount"></span>
  </div>
  <div id="list"></div>
</div>

<a class="fab" href="pickup-search.html" aria-label="new pickup" data-i18n-title="newPickupBatch">+</a>

<script src="js/api.js?v=20260520-customer-quick"></script>
<script src="js/i18n.js?v=20260520-customer-quick"></script>
<script>
const pageAllowed = requireRolePage('boss');
if (pageAllowed) injectBossNav('pickup');
let batches = [];
let readyOrders = [];
async function loadBatches() {
  document.getElementById('list').innerHTML = skeletonRows(4);
  document.getElementById('stats').innerHTML = skeletonRows(2);
  const [data, ready] = await Promise.all([
    api('/api/pickups/batches'),
    api('/api/orders?status=ready_pickup&limit=100'),
  ]);
  batches = data.batches || [];
  readyOrders = ready.orders || [];
  render();
}
function render() {
  const el = document.getElementById('list');
  const statsEl = document.getElementById('stats');
  const readyOrderCount = readyOrders.length;
  const unpickedPieces = readyOrders.reduce((sum, o) => sum + Number(o.unpicked_pieces || 0), 0);
  const activeItems = batches.reduce((sum, b) => sum + Number(b.active_items || 0), 0);
  const revertedItems = batches.reduce((sum, b) => sum + Number(b.reverted_items || 0), 0);
  document.getElementById('batchCount').textContent = batches.length
    ? tn('pickupBatchCountN', { n: batches.length })
    : '';
  statsEl.innerHTML = `
    <div class="pickup-stat-card warn">
      <div class="value">${readyOrderCount}</div>
      <div class="label">${esc(t('pickupReadyOrders'))}</div>
    </div>
    <div class="pickup-stat-card info">
      <div class="value">${unpickedPieces}</div>
      <div class="label">${esc(t('unpickedPieces'))}</div>
    </div>
    <div class="pickup-stat-card">
      <div class="value">${batches.length}</div>
      <div class="label">${esc(t('pickupBatches'))}</div>
    </div>
    <div class="pickup-stat-card danger">
      <div class="value">${revertedItems}</div>
      <div class="label">${esc(t('revertedPieces'))}</div>
    </div>`;
  if (!batches.length) {
    el.innerHTML = `<div class="empty-state"><div>${esc(t('noPickupBatches'))}</div><a class="btn btn-primary cta" href="pickup-search.html">${esc(t('newPickupBatch'))}</a></div>`;
    return;
  }
  el.innerHTML = `<div class="card" style="padding:0; overflow:hidden;">${batches.map(b => `
    <a class="row" href="pickup-batch-detail.html?id=${b.id}">
      <div style="flex:1;">
        <div class="row-title">${esc(b.batch_number)} · ${esc(b.company)}</div>
        <div class="row-sub">${esc(relativeTime(b.picked_at))} · ${esc(tn('piecesShortN', { n: Number(b.active_items || 0) }))}${Number(b.reverted_items || 0) ? ' · ' + esc(tn('revertedPiecesN', { n: Number(b.reverted_items || 0) })) : ''}</div>
      </div>
      <span class="badge badge-pickup">${esc(t('pickupComplete'))}</span>
    </a>`).join('')}</div>`;
}
function onLangChange() { render(); }
if (pageAllowed) {
  loadBatches().catch(err => {
    document.getElementById('list').innerHTML = errorState(err.message, t('retry'), loadBatches);
  });
}
</script>
</body>
</html>
