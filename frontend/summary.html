<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Summary</title>
<link rel="stylesheet" href="shared.css?v=20260522-optional-signature">
</head>
<body>
<div class="topbar">
  <div class="topbar-title" data-i18n="navSummary">汇总</div>
  <button class="logout-btn" onclick="logout()" data-i18n="logout">退出</button>
</div>

<div class="content-shell boss-shell">
  <div id="body"></div>
</div>

<script src="js/api.js?v=20260522-optional-signature"></script>
<script src="js/i18n.js?v=20260522-optional-signature"></script>
<script>
const pageAllowed = requireRolePage('boss');
if (pageAllowed) injectBossNav('summary');
let summary = null;

async function loadSummary() {
  document.getElementById('body').innerHTML = skeletonRows(5);
  summary = await api('/api/summary/overview');
  render();
}

function stat(v) { return Number(v || 0); }

function render() {
  if (!summary) return;
  const tts = summary.totals || {};
  document.getElementById('body').innerHTML = `
    ${renderStatCells([
      { value: stat(tts.orders), label: t('ordersCount') },
      { value: stat(tts.pieces), label: t('totalPieces') },
      { value: stat(tts.picked_pieces), label: t('pickedPieces'), tone: 'info' },
      { value: stat(tts.finished_pieces), label: t('finishedPieces') },
      { value: stat(tts.hold_pieces), label: t('holdPieces'), tone: stat(tts.hold_pieces) ? 'warn' : '' },
      { value: stat(tts.rework_pieces), label: t('reworkPieces'), tone: stat(tts.rework_pieces) ? 'danger' : '' },
    ], { className: 'metrics-grid summary-stats-grid' })}
    ${renderPanel({
      title: t('summaryByStatus'),
      body: `
      ${(summary.by_status || []).map(r => `
        <div class="row">
          <div style="flex:1;"><div class="row-title">${esc(statusLabel(r.status))}</div><div class="row-sub">${esc(tn('piecesShortN', { n: stat(r.pieces) }))}</div></div>
          <div class="num" style="font-weight:800;">${stat(r.orders)}</div>
        </div>`).join('')}
    `,
      className: 'summary-panel',
    })}
    ${renderPanel({
      title: t('summaryByCustomer'),
      meta: tn('customerSearchResultCount', { shown: (summary.by_customer || []).length, total: (summary.by_customer || []).length }),
      body: `
      ${(summary.by_customer || []).map(c => `
        <a class="row" href="summary-customer.html?id=${c.customer_id}">
          <div style="flex:1;">
            <div class="row-title">${esc(c.company)}</div>
            <div class="row-sub">${esc(tn('ordersPiecesN', { orders: stat(c.orders), pieces: stat(c.pieces) }))} · ${esc(t('pickedPieces'))} ${stat(c.picked_pieces)}</div>
          </div>
          <div style="color:var(--text-3); font-size:20px;">›</div>
        </a>`).join('')}
    `,
      className: 'summary-panel',
    })}`;
  scheduleMotion(document.getElementById('body'));
}

function statusLabel(status) {
  if (status === 'ready_pickup') return t('statusReadyPickup');
  if (status === 'picked_up') return t('statusPickedUp');
  return t('statusInProduction');
}
function onLangChange() { render(); }
if (pageAllowed) {
  loadSummary().catch(err => {
    document.getElementById('body').innerHTML = errorState(err.message, t('retry'), loadSummary);
  });
}
</script>
</body>
</html>
