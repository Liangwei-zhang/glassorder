<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Customer Summary</title>
<link rel="stylesheet" href="shared.css?v=20260521-pickup-tabs">
</head>
<body>
<div class="topbar">
  <a href="summary.html" class="back-btn">‹</a>
  <div class="topbar-title" id="title" data-i18n="customerStatement">客户对账</div>
  <button class="logout-btn" onclick="logout()" data-i18n="logout">退出</button>
</div>
<div class="center-col" style="padding:16px 16px 110px;">
  <div id="body"></div>
</div>
<div class="action-bar">
  <a class="btn btn-ghost back" href="summary.html" data-i18n="back">返回</a>
  <button class="btn btn-primary" onclick="window.print()" data-i18n="printBtn">打印</button>
</div>
<script src="js/api.js?v=20260521-pickup-tabs"></script>
<script src="js/i18n.js?v=20260521-pickup-tabs"></script>
<script>
const allowed = requireRolePage('boss');
const id = new URLSearchParams(location.search).get('id');
let data = null;
async function loadCustomerSummary() {
  data = await api('/api/summary/customers/' + id);
  render();
}
function render() {
  if (!data) return;
  document.getElementById('title').textContent = data.customer.company;
  document.getElementById('body').innerHTML = `
    <div class="card" style="margin-bottom:12px;">
      <div class="row-title">${esc(data.customer.company)}</div>
      <div class="row-sub">${esc(data.customer.contact_name || '')} · ${esc(data.customer.phone || t('noPhone'))} · ${esc(data.customer.email || t('noEmail'))}</div>
    </div>
    <div class="card" style="padding:0; overflow:hidden; margin-bottom:12px;">
      <div style="padding:12px 14px; font-weight:700;">${esc(t('orders'))}</div>
      ${(data.orders || []).map(o => `
        <div class="row">
          <div style="flex:1;">
            <div class="row-title">#${esc(o.order_number)} · ${esc(orderStatusLabel(o))}</div>
            <div class="row-sub">${esc(o.project_name || '')} · ${esc(t('totalPieces'))} ${o.total_pieces} · ${esc(t('pickedPieces'))} ${o.picked_pieces} · ${esc(t('unpickedPieces'))} ${o.unpicked_pieces}</div>
          </div>
        </div>`).join('')}
    </div>
    <div class="card" style="padding:0; overflow:hidden;">
      <div style="padding:12px 14px; font-weight:700;">${esc(t('pickupBatches'))}</div>
      ${(data.batches || []).map(b => `
        <a class="row" href="pickup-batch-detail.html?id=${b.id}">
          <div style="flex:1;">
            <div class="row-title">${esc(b.batch_number)}</div>
            <div class="row-sub">${esc(relativeTime(b.picked_at))} · ${esc(tn('piecesShortN', { n: Number(b.active_items || 0) }))}</div>
          </div>
          <div style="color:var(--text-3); font-size:20px;">›</div>
        </a>`).join('') || `<div style="padding:16px; color:var(--text-3);">${esc(t('noPickupBatches'))}</div>`}
    </div>`;
}
function orderStatusLabel(order) {
  if (order.pickup_status === 'partial') return t('statusPartialPickup');
  if (order.status === 'ready_pickup') return t('statusReadyPickup');
  if (order.status === 'picked_up') return t('statusPickedUp');
  return t('statusInProduction');
}
function onLangChange() { render(); }
if (allowed) {
  loadCustomerSummary().catch(err => {
    document.getElementById('body').innerHTML = errorState(err.message, t('retry'), loadCustomerSummary);
  });
}
</script>
<style>
@media print {
  .topbar, .bottom-nav, .action-bar { display:none !important; }
  body { background:white; }
  .card { box-shadow:none; border:1px solid var(--border-1); }
}
</style>
</body>
</html>
