<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Orders</title>
<link rel="stylesheet" href="shared.css?v=20260621-scan-style">
</head>
<body>

<div class="topbar">
  <div class="topbar-title" id="pageTitle" data-i18n="orderOverview">订单总览</div>
  <button class="scan-btn" id="barcodeScanBtn" type="button" onclick="openBarcodeScan()" data-i18n-title="scanBarcodeTitle" title="扫一扫">
    <svg class="scan-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M4 7V5a1 1 0 0 1 1-1h2"></path>
      <path d="M17 4h2a1 1 0 0 1 1 1v2"></path>
      <path d="M20 17v2a1 1 0 0 1-1 1h-2"></path>
      <path d="M7 20H5a1 1 0 0 1-1-1v-2"></path>
      <path d="M7 8v8"></path>
      <path d="M10 8v8"></path>
      <path d="M14 8v8"></path>
      <path d="M17 8v8"></path>
    </svg>
    <span data-i18n="scanLabel">扫一扫</span>
  </button>
  <button class="logout-btn" onclick="logout()" data-i18n="logout">退出</button>
</div>

<div class="content-shell bottom-nav-space page-pad-bottom">
  <div id="alerts"></div>

  <div class="dashboard-stats">
    <button class="stat-tile stat-action" type="button" data-quick-filter="all">
      <div id="stat-total" class="num-big">-</div>
      <div class="num-label" data-i18n="orderTotal">订单总数</div>
    </button>
    <button class="stat-tile stat-action" type="button" data-quick-filter="in_production">
      <div id="stat-prod" class="num-big stat-num-warn">-</div>
      <div class="num-label" data-i18n="statusInProduction">生产中</div>
    </button>
    <button class="stat-tile stat-action" type="button" data-quick-filter="ready_pickup">
      <div id="stat-pickup" class="num-big stat-num-info">-</div>
      <div class="num-label" data-i18n="pickupReady">待取货</div>
    </button>
    <button class="stat-tile stat-action" type="button" data-quick-filter="rework">
      <div id="stat-rework" class="num-big stat-num-danger">-</div>
      <div class="num-label" data-i18n="reworkN">待补片</div>
    </button>
  </div>

  <div class="dashboard-filter-bar">
    <button class="btn filter-btn" data-view="active" data-filter="all" data-i18n="all">全部</button>
    <button class="btn filter-btn" data-view="active" data-filter="picked_up" data-i18n="statusPickedUp">已取货</button>
    <button class="btn filter-btn" id="moreFilterBtn" type="button" data-i18n="filterMore">筛选</button>
  </div>

  <input class="form-input search-block" id="search" type="search" enterkeyhint="search" autocomplete="off" data-i18n-placeholder="searchPlaceholder" placeholder="搜索 PO / 公司名">
  <div id="list" class="card order-list-panel"></div>
</div>

<a class="fab" href="boss-new-order.html" aria-label="new order">+</a>

<div class="modal-backdrop" id="dashboardEditModal">
  <div class="modal">
    <div style="font-size:20px; font-weight:800; margin-bottom:12px;" data-i18n="editOrder">修改订单</div>
    <label class="form-label" data-i18n="project">项目</label>
    <input class="form-input" id="dashboardEditProject">
    <label class="form-label" style="margin-top:10px;" data-i18n="priority">优先级</label>
    <select class="form-select" id="dashboardEditPriority">
      <option value="normal" data-i18n="priorityNormal">正常</option>
      <option value="rush" data-i18n="priorityRush">加急</option>
      <option value="rework" data-i18n="priorityRework">返工</option>
    </select>
    <label class="form-label" style="margin-top:10px;" data-i18n="deadline">计划日期</label>
    <input class="form-input" id="dashboardEditDeadline" type="date">
    <label class="form-label" style="margin-top:10px;" data-i18n="note">备注</label>
    <textarea class="form-textarea" id="dashboardEditNote" rows="2"></textarea>
    <div style="font-weight:700; margin-top:14px;" data-i18n="pieceNotes">片子工序 / 备注</div>
    <div id="dashboardEditPieces" style="max-height:40vh; overflow:auto; margin-top:6px;"></div>
    <div style="display:flex; gap:10px; margin-top:14px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeDashboardEdit()" data-i18n="cancel">取消</button>
      <button class="btn btn-primary" style="flex:1;" onclick="saveDashboardEdit(event)" data-i18n="saveChanges">保存修改</button>
    </div>
  </div>
</div>

<script src="js/api.js?v=20260621-scan-style"></script>
<script src="js/i18n.js?v=20260621-scan-style"></script>
<script>
const pageAllowed = requireRolePage('boss');
const archiveMode = new URLSearchParams(location.search).get('archived') === '1';
let viewMode = archiveMode ? 'archive' : 'active';
let currentFilter = 'all';
let allOrders = [];
let dashboardStats = null;
let firstLoad = true;
let searchDebounce = null;
let dashboardLoadSeq = 0;
let dashboardEditOrder = null;
let longPressTimer = null;
let longPressRow = null;
let longPressStart = null;
let lastLongPressAt = 0;
const dashboardSearchInput = document.getElementById('search');
const dashboardSearchIsTouch = window.matchMedia('(pointer: coarse)').matches;
let dashboardSearchBlurTimer = null;
let dashboardSearchStamp = 0;
let dashboardScanStream = null;
let dashboardScanFrame = 0;

const SCROLL_KEY = 'gd_scroll';
window.addEventListener('beforeunload', () => {
  sessionStorage.setItem(SCROLL_KEY, String(window.scrollY || 0));
});

function clearDashboardSearchBlur() {
  if (dashboardSearchBlurTimer) {
    clearTimeout(dashboardSearchBlurTimer);
    dashboardSearchBlurTimer = null;
  }
}

function scheduleDashboardSearchBlur(delayMs = 500) {
  if (!dashboardSearchIsTouch) return;
  const stamp = dashboardSearchStamp;
  clearDashboardSearchBlur();
  dashboardSearchBlurTimer = window.setTimeout(() => {
    if (stamp !== dashboardSearchStamp) return;
    if (document.activeElement === dashboardSearchInput && dashboardSearchInput.value.trim()) {
      dashboardSearchInput.blur();
    }
  }, delayMs);
}

function normalizeScannedBarcode(value) {
  const match = String(value || '').toUpperCase().match(/GO-\d+-\d+-\d+/);
  return match ? match[0] : String(value || '').trim();
}

async function findScannedOrder(rawCode) {
  const code = normalizeScannedBarcode(rawCode);
  if (!code) return;
  dashboardSearchInput.value = code;
  dashboardSearchStamp = Date.now();
  try {
    await withGlobalLoader(async () => {
      const data = await api('/api/orders?include_archived=1&limit=1&barcode=' + encodeURIComponent(code));
      const order = (data.orders || [])[0];
      if (!order) throw new Error(t('scanOrderNotFound'));
      toast(tn('scanOrderFound', { code: orderCodeText(order) }), { type: 'success' });
      location.href = `boss-order-detail.html?id=${order.id}`;
    }, { minMs: 180 });
  } catch (err) {
    toast(t('scanOrderNotFound'), { type: 'danger' });
    loadOrdersOrError();
  }
}

async function manualBarcodeSearch() {
  const code = await promptModal({
    title: t('scanManualTitle'),
    body: t('scanManualBody'),
    placeholder: t('scanManualPlaceholder'),
    confirmText: t('scanSearch'),
    required: true,
    maxLength: 80,
  });
  if (code) await findScannedOrder(code);
}

function stopDashboardScanner() {
  if (dashboardScanFrame) {
    cancelAnimationFrame(dashboardScanFrame);
    dashboardScanFrame = 0;
  }
  if (dashboardScanStream) {
    dashboardScanStream.getTracks().forEach((track) => track.stop());
    dashboardScanStream = null;
  }
}

async function barcodeDetector() {
  if (!window.BarcodeDetector) return null;
  if (typeof window.BarcodeDetector.getSupportedFormats !== 'function') return new window.BarcodeDetector();
  const formats = await window.BarcodeDetector.getSupportedFormats();
  if (formats.includes('code_128')) return new window.BarcodeDetector({ formats: ['code_128'] });
  return formats.length ? new window.BarcodeDetector({ formats }) : new window.BarcodeDetector();
}

async function openBarcodeScan() {
  const detector = await barcodeDetector().catch(() => null);
  if (!detector || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    await manualBarcodeSearch();
    return;
  }

  const overlay = document.createElement('div');
  overlay.className = 'modal-backdrop scan-backdrop';
  overlay.setAttribute('role', 'dialog');
  overlay.setAttribute('aria-modal', 'true');
  overlay.innerHTML = `
    <div class="modal scan-modal">
      <div class="scan-modal-head">
        <div>
          <div class="scan-title">${esc(t('scanBarcodeTitle'))}</div>
          <div class="row-sub">${esc(t('scanCameraHint'))}</div>
        </div>
        <button class="btn btn-ghost btn-inline-compact" type="button" data-role="close">${esc(t('close'))}</button>
      </div>
      <video class="scan-video" autoplay muted playsinline></video>
      <div class="scan-manual-row">
        <input class="form-input" data-role="manual" autocomplete="off" placeholder="${escAttr(t('scanManualPlaceholder'))}">
        <button class="btn btn-primary" type="button" data-role="manual-go">${esc(t('scanSearch'))}</button>
      </div>
      <div class="row-sub" data-role="status">${esc(t('scanCameraStarting'))}</div>
    </div>`;
  document.body.appendChild(overlay);
  lockAppOverlay();
  requestAnimationFrame(() => overlay.classList.add('open'));

  const video = overlay.querySelector('video');
  const input = overlay.querySelector('[data-role="manual"]');
  const status = overlay.querySelector('[data-role="status"]');
  let closed = false;
  let lastDetect = 0;

  const close = () => {
    if (closed) return;
    closed = true;
    stopDashboardScanner();
    overlay.classList.remove('open');
    document.removeEventListener('keydown', onKey, true);
    unlockAppOverlay();
    setTimeout(() => overlay.remove(), 220);
  };
  const submitManual = () => {
    const code = input.value.trim();
    if (!code) return;
    close();
    findScannedOrder(code);
  };
  const onKey = (event) => {
    if (event.key === 'Escape') {
      event.stopPropagation();
      close();
    } else if (event.key === 'Enter' && document.activeElement === input) {
      event.preventDefault();
      submitManual();
    }
  };
  document.addEventListener('keydown', onKey, true);
  overlay.addEventListener('click', (event) => {
    const role = event.target && event.target.dataset && event.target.dataset.role;
    if (event.target === overlay || role === 'close') close();
    if (role === 'manual-go') submitManual();
  });

  try {
    dashboardScanStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } },
      audio: false,
    });
    video.srcObject = dashboardScanStream;
    status.textContent = t('scanCameraLive');
    const scan = async (ts) => {
      if (closed) return;
      if (video.readyState >= 2 && ts - lastDetect > 180) {
        lastDetect = ts;
        const hits = await detector.detect(video).catch(() => []);
        const hit = hits.find((item) => item && item.rawValue);
        if (hit) {
          close();
          await findScannedOrder(hit.rawValue);
          return;
        }
      }
      dashboardScanFrame = requestAnimationFrame(scan);
    };
    dashboardScanFrame = requestAnimationFrame(scan);
  } catch (err) {
    status.textContent = t('scanCameraUnavailable');
    setTimeout(() => input.focus(), 60);
  }
}

async function loadOrders(expectedSeq) {
  updatePageTitle();
  const q = document.getElementById('search').value.trim();
  const params = new URLSearchParams({ limit: '100' });
  const statsParams = new URLSearchParams();
  if (viewMode === 'archive') params.set('archived', '1');
  if (viewMode === 'archive') statsParams.set('archived', '1');
  if (currentFilter === 'rush') params.set('priority', 'rush');
  else if (currentFilter === 'overdue' || currentFilter === 'rework') params.set('filter', currentFilter);
  else if (!['all', 'overdue', 'rework'].includes(currentFilter)) params.set('status', currentFilter);
  if (q) params.set('search', q);
  if (firstLoad) {
    document.getElementById('list').innerHTML = skeletonRows(5);
  }
  const [data, statsData] = await Promise.all([
    api('/api/orders?' + params.toString()),
    api('/api/orders/stats' + (statsParams.toString() ? '?' + statsParams.toString() : '')),
  ]);
  if (expectedSeq && expectedSeq !== dashboardLoadSeq) return;
  allOrders = data.orders || [];
  dashboardStats = statsData.stats || null;
  renderStats();
  renderAlerts();
  renderFilterState();
  renderList();
  if (firstLoad) {
    firstLoad = false;
    const y = Number(sessionStorage.getItem(SCROLL_KEY) || 0);
    if (y > 0) {
      requestAnimationFrame(() => window.scrollTo({ top: y, behavior: 'auto' }));
      sessionStorage.removeItem(SCROLL_KEY);
    }
  }
}

function statNumber(key) {
  return Number((dashboardStats && dashboardStats[key]) || 0);
}

function renderStats() {
  document.getElementById('stat-total').textContent = statNumber('total_orders');
  document.getElementById('stat-prod').textContent = statNumber('in_production_orders');
  document.getElementById('stat-pickup').textContent = statNumber('ready_pickup_orders');
  document.getElementById('stat-rework').textContent = statNumber('rework_pieces');
  scheduleMotion(document.querySelector('.dashboard-stats'));
}

function renderAlerts() {
  const box = document.getElementById('alerts');
  const reworkSum = statNumber('rework_pieces');
  const overdueCount = statNumber('overdue_orders');
  const pickupCount = statNumber('ready_pickup_orders');
  const overdueOrders = allOrders.filter(isOverdue).slice(0, 5);
  const tasks = [];
  if (reworkSum > 0) tasks.push({
    tone: 'danger',
    count: reworkSum,
    title: tn('reworkAlertN', { n: reworkSum }),
    sub: t('reworkAlertSub'),
    filter: 'rework',
  });
  if (overdueCount > 0) tasks.push({
    tone: 'warn',
    count: overdueCount,
    title: tn('overdueAlertN', { n: overdueCount }),
    sub: overdueOrders.length ? overdueOrders.map(orderCodeText).join(', ') : t('dashboardCheckOverdue'),
    filter: 'overdue',
  });
  if (pickupCount > 0) tasks.push({
    tone: 'info',
    count: pickupCount,
    title: tn('dashboardPickupTaskN', { n: pickupCount }),
    sub: t('dashboardPickupTaskSub'),
    filter: 'ready_pickup',
  });
  if (!tasks.length) {
    box.innerHTML = '';
    return;
  }
  box.innerHTML = `
    <section class="task-priority-stack" aria-label="${escAttr(t('dashboardPriority'))}">
      ${tasks.slice(0, 3).map(task => `
        <button class="dashboard-task-card ${task.tone}" type="button" onclick="setDashboardFilter('${task.filter}', 'active')">
          <span class="dashboard-task-count">${esc(String(task.count))}</span>
          <span class="dashboard-task-main">
            <strong>${esc(task.title)}</strong>
            <em>${esc(task.sub)}</em>
          </span>
        </button>`).join('')}
    </section>`;
  scheduleMotion(box);
}

function renderList() {
  const el = document.getElementById('list');
  if (allOrders.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-3); margin-bottom:10px;" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="2"></rect>
        <line x1="3" y1="9" x2="21" y2="9"></line>
        <line x1="9" y1="21" x2="9" y2="9"></line>
      </svg>
      <div>${esc(viewMode === 'archive' ? t('noArchivedOrders') : t('noOrdersMatch'))}</div>
      <a class="btn btn-primary cta" href="${viewMode === 'archive' ? 'boss-dashboard.html' : 'boss-new-order.html'}" style="text-decoration:none;">${esc(viewMode === 'archive' ? t('viewActiveOrders') : t('newOrderCta'))}</a>
    </div>`;
    return;
  }
  el.innerHTML = allOrders.map(o => {
    const pct = orderProgress(o);
    const rw = reworkCount(o);
    const overdue = isOverdue(o);
    const pctClass = o.priority === 'rush' ? 'rush' : (pct === 100 ? 'done' : '');
    return `
      <a class="row order-row order-card-layout" href="boss-order-detail.html?id=${o.id}" data-order-id="${o.id}">
        <div class="order-card-main">
          <div class="order-card-copy">
            <div class="row-title">
              ${orderTitle(o)}
              ${o.priority === 'rush' ? `<span class="badge badge-rush inline-badge-space">${esc(t('badgeRush'))}</span>` : ''}
              ${rw > 0 ? `<span class="badge badge-rework inline-badge-space">${esc(tn('badgeReworkN', { n: rw }))}</span>` : ''}
              ${overdue ? `<span class="badge badge-warn inline-badge-space">${esc(t('badgeOverdue'))}</span>` : ''}
            </div>
            <div class="row-sub">${esc(o.project_name || '')} · ${esc(tn('piecesShortN', { n: Number(o.total_pieces || 0) }))} · ${esc(t('plan'))} ${esc(o.deadline || t('notSet'))}</div>
          </div>
          ${statusBadge(o)}
        </div>
        <div class="order-card-progress">
          <div class="progress"><div class="progress-fill ${pctClass}" style="width:${pct}%;"></div></div>
          <div class="order-card-progress-value">${pct}%</div>
        </div>
      </a>`;
  }).join('');
}

function getOrderById(orderId) {
  return allOrders.find((item) => String(item.id) === String(orderId));
}

function primaryOrderAction(targetOrder) {
  const pct = orderProgress(targetOrder);
  if (targetOrder.status === 'ready_pickup') {
    return {
      label: t('pickupSign'),
      onClick: () => { location.href = `pickup-search.html?order_id=${targetOrder.id}`; },
    };
  }
  if (targetOrder.status === 'picked_up') {
    return {
      label: t('sendSlipBtn'),
      onClick: () => sendDashboardSlip(targetOrder),
    };
  }
  if (pct === 100) {
    return {
      label: t('notifyReady'),
      onClick: () => markDashboardReady(targetOrder),
    };
  }
  return {
    label: t('workshopView'),
    onClick: () => { location.href = `worker-pieces.html?id=${targetOrder.id}&stage=all`; },
  };
}

function buildDashboardOrderMenu(targetOrder) {
  const items = [
    { label: t('menuEditOrder'), onClick: () => openDashboardEdit(targetOrder.id) },
    primaryOrderAction(targetOrder),
    { divider: true },
    { label: t('orderDetail'), onClick: () => { location.href = `boss-order-detail.html?id=${targetOrder.id}`; } },
  ];
  if (targetOrder.status === 'picked_up') {
    if (!targetOrder.archived_at) {
      items.push({ label: t('menuArchiveOrder'), onClick: () => archiveDashboardOrder(targetOrder) });
      items.push({ divider: true });
      items.push({ label: t('menuRevertPickup'), danger: true, onClick: () => revertDashboardPickup(targetOrder) });
    }
  }
  if (canDeleteDashboardOrder(targetOrder)) {
    items.push({ divider: true });
    items.push({ label: t('menuDeleteOrder'), danger: true, onClick: () => deleteDashboardOrder(targetOrder) });
  }
  return items;
}

function canDeleteDashboardOrder(targetOrder) {
  return targetOrder
    && !targetOrder.archived_at
    && targetOrder.status !== 'picked_up'
    && targetOrder.pickup_status !== 'partial'
    && targetOrder.pickup_status !== 'picked_up';
}

function openDashboardOrderMenu(anchorEl, orderId, options = {}) {
  const targetOrder = getOrderById(orderId);
  if (!targetOrder) {
    toast(t('requestFailed'), { type: 'danger' });
    return;
  }
  popMenu(anchorEl, buildDashboardOrderMenu(targetOrder), options);
}

function clearLongPress() {
  if (longPressTimer) {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  }
  longPressRow = null;
  longPressStart = null;
}

function bindOrderListGestures() {
  const list = document.getElementById('list');
  list.addEventListener('pointerdown', (event) => {
    const row = event.target.closest('.order-row');
    if (!row || event.pointerType === 'mouse' || event.button !== 0) return;
    clearLongPress();
    longPressRow = row;
    longPressStart = { x: event.clientX, y: event.clientY };
    longPressTimer = window.setTimeout(() => {
      if (!longPressRow) return;
      const pressedRow = longPressRow;
      lastLongPressAt = Date.now();
      pressedRow.classList.add('long-press-active');
      window.setTimeout(() => pressedRow.classList.remove('long-press-active'), 260);
      openDashboardOrderMenu(pressedRow, pressedRow.dataset.orderId, { ignoreOutsideClickMs: 900 });
      clearLongPress();
    }, 520);
  });
  list.addEventListener('pointermove', (event) => {
    if (!longPressStart) return;
    const dx = Math.abs(event.clientX - longPressStart.x);
    const dy = Math.abs(event.clientY - longPressStart.y);
    if (dx > 10 || dy > 10) clearLongPress();
  });
  ['pointerup', 'pointercancel', 'pointerleave'].forEach((name) => {
    list.addEventListener(name, clearLongPress);
  });
  list.addEventListener('contextmenu', (event) => {
    const row = event.target.closest('.order-row');
    if (!row) return;
    event.preventDefault();
    if (Date.now() - lastLongPressAt < 900) return;
    openDashboardOrderMenu(row, row.dataset.orderId);
  });
  list.addEventListener('click', (event) => {
    if (Date.now() - lastLongPressAt < 700) {
      event.preventDefault();
      event.stopPropagation();
    }
  }, true);
}

async function openDashboardEdit(orderId) {
  try {
    const data = await withGlobalLoader(() => api('/api/orders/' + orderId), { minMs: 220 });
    dashboardEditOrder = data.order;
  } catch (err) {
    toast(err.message, { type: 'danger' });
    return;
  }
  document.getElementById('dashboardEditProject').value = dashboardEditOrder.project_name || '';
  document.getElementById('dashboardEditPriority').value = dashboardEditOrder.priority || 'normal';
  document.getElementById('dashboardEditDeadline').value = dashboardEditOrder.deadline || '';
  document.getElementById('dashboardEditNote').value = dashboardEditOrder.note || '';
  document.getElementById('dashboardEditPieces').innerHTML = dashboardEditOrder.pieces.map(p => `
    <div class="card" style="background: var(--surface-2); margin-top:8px; padding:10px;" data-dashboard-piece-edit="${p.id}">
      <div style="font-weight:700;">#${p.piece_no} · ${esc(p.size || '')}</div>
      <input class="form-input" style="margin-top:8px;" data-field="piece_note" value="${escAttr(p.piece_note || '')}" placeholder="${esc(t('note'))}">
      <div class="checkbox-row">
        <label><input type="checkbox" data-step="cut" ${pieceStepChecked(p, 'cut')}> ${esc(stageLabel('cut'))}</label>
        <label><input type="checkbox" data-step="edge" ${pieceStepChecked(p, 'edge')}> ${esc(stageLabel('edge'))}</label>
        <label><input type="checkbox" data-step="tempered" ${pieceStepChecked(p, 'tempered')}> ${esc(stageLabel('tempered'))}</label>
        <label><input type="checkbox" data-step="polish" ${pieceStepChecked(p, 'polish')}> ${esc(stageLabel('polish'))}</label>
      </div>
    </div>`).join('');
  document.getElementById('dashboardEditModal').classList.add('open');
  applyI18n();
}

function closeDashboardEdit() {
  document.getElementById('dashboardEditModal').classList.remove('open');
}

function pieceStepChecked(piece, step) {
  const required = piece.required_steps || (piece.process_config && piece.process_config.required_steps) || ['cut', 'edge', 'tempered'];
  return required.includes(step) ? 'checked' : '';
}

async function saveDashboardEdit(ev) {
  if (!dashboardEditOrder) return;
  const btn = ev && ev.currentTarget ? ev.currentTarget : null;
  await withBusy(btn, async () => {
    const pieces = [...document.querySelectorAll('[data-dashboard-piece-edit]')].map(row => ({
      id: Number(row.dataset.dashboardPieceEdit),
      piece_note: row.querySelector('[data-field="piece_note"]').value.trim(),
      required_steps: [...row.querySelectorAll('[data-step]:checked')].map(input => input.dataset.step),
    }));
    try {
      await api('/api/orders/' + dashboardEditOrder.id, {
        method: 'PATCH',
        body: {
          project_name: document.getElementById('dashboardEditProject').value.trim(),
          priority: document.getElementById('dashboardEditPriority').value,
          deadline: document.getElementById('dashboardEditDeadline').value,
          note: document.getElementById('dashboardEditNote').value.trim(),
          pieces,
        },
      });
      closeDashboardEdit();
      dashboardEditOrder = null;
      await loadOrdersOrError();
      toast(t('saved'), { type: 'success' });
    } catch (err) {
      toast(err.message, { type: 'danger' });
    }
  });
}

async function sendDashboardSlip(targetOrder) {
  try {
    await withGlobalLoader(async () => {
      const data = await api('/api/orders/' + targetOrder.id + '/send-slip', { method: 'POST' });
      const skipped = data.mail && data.mail.skipped;
      toast(
        skipped ? tn('slipSkipped', { reason: data.mail.reason || '' }) : t('slipSent'),
        { type: skipped ? '' : 'success' },
      );
    });
  } catch (err) {
    toast(err.message, { type: 'danger' });
  }
}

async function markDashboardReady(targetOrder) {
  const ok = await confirmModal({
    title: t('notifyReadyConfirm'),
    body: t('notifyReadyBody'),
    confirmText: t('confirmNotify'),
  });
  if (!ok) return;
  try {
    await withGlobalLoader(async () => {
      await api('/api/orders/' + targetOrder.id + '/ready', { method: 'POST' });
      await loadOrdersOrError();
      toast(t('markedReady'), { type: 'success' });
    });
  } catch (err) {
    toast(err.message, { type: 'danger' });
  }
}

async function archiveDashboardOrder(targetOrder) {
  const ok = await confirmModal({
    title: t('archiveOrderConfirm'),
    body: t('archiveOrderBody'),
    confirmText: t('menuArchiveOrder'),
  });
  if (!ok) return;
  try {
    await withGlobalLoader(async () => {
      await api('/api/orders/' + targetOrder.id + '/archive', { method: 'POST' });
      await loadOrdersOrError();
      toast(t('orderArchived'), { type: 'success' });
    });

  }

async function deleteDashboardOrder(targetOrder) {
  if (!canDeleteDashboardOrder(targetOrder)) return;
  const ok = await confirmModal({
    title: tn('deleteOrderConfirm', { order: orderCodeText(targetOrder) }),
    body: t('deleteOrderBody'),
    confirmText: t('menuDeleteOrder'),
    danger: true,
  });
  if (!ok) return;
  try {
    await withGlobalLoader(async () => {
      await api('/api/orders/' + targetOrder.id, { method: 'DELETE' });
      await loadOrdersOrError();
      toast(t('orderDeleted'), { type: 'success' });
    });
  } catch (err) {
    toast(err.message, { type: 'danger' });
  }
}

async function revertDashboardPickup(targetOrder) {
  const ok = await confirmModal({
    title: t('revertPickupConfirm'),
    body: t('revertPickupBody'),
    confirmText: t('menuRevertPickup'),
    danger: true,
  });
  if (!ok) return;
  try {
    await withGlobalLoader(async () => {
      await api('/api/orders/' + targetOrder.id + '/revert-pickup', { method: 'POST' });
      await loadOrdersOrError();
      toast(t('pickupReverted'), { type: 'success' });
    });
  } catch (err) {
    toast(err.message, { type: 'danger' });
  }
}

function setDashboardFilter(nextFilter, nextView) {
  viewMode = nextView || 'active';
  currentFilter = nextFilter || 'all';
  const url = viewMode === 'archive' ? 'boss-dashboard.html?archived=1' : 'boss-dashboard.html';
  if (location.pathname.endsWith('/boss-dashboard.html') || location.pathname === '/') {
    history.replaceState(null, '', url);
  }
  loadOrdersOrError();
}

function renderFilterState() {
  document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
  const activeBtn = viewMode === 'active'
    ? document.querySelector(`[data-view="active"][data-filter="${currentFilter}"]`)
    : null;
  if (activeBtn) activeBtn.classList.add('active');
  const moreBtn = document.getElementById('moreFilterBtn');
  if (moreBtn) moreBtn.classList.toggle('active', viewMode === 'archive' || (viewMode === 'active' && !['all', 'picked_up'].includes(currentFilter)));
  document.querySelectorAll('[data-quick-filter]').forEach((card) => {
    card.classList.toggle('active', viewMode === 'active' && card.dataset.quickFilter === currentFilter);
  });
}

document.querySelectorAll('[data-view]').forEach(b => {
  b.addEventListener('click', () => {
    const nextView = b.dataset.view === 'archive' ? 'archive' : 'active';
    const nextFilter = nextView === 'archive' ? 'all' : (b.dataset.filter || 'all');
    setDashboardFilter(nextFilter, nextView);
  });
});

document.querySelectorAll('[data-quick-filter]').forEach(card => {
  card.addEventListener('click', () => {
    setDashboardFilter(card.dataset.quickFilter || 'all', 'active');
  });
});

document.getElementById('moreFilterBtn').addEventListener('click', (event) => {
  popMenu(event.currentTarget, [
    { label: t('archiveShort'), onClick: () => setDashboardFilter('all', 'archive') },
    { divider: true },
    { label: t('filterRush'), onClick: () => setDashboardFilter('rush', 'active') },
    { label: t('filterOverdue'), onClick: () => setDashboardFilter('overdue', 'active') },
    { label: t('statusInProduction'), onClick: () => setDashboardFilter('in_production', 'active') },
    { label: t('statusReadyPickup'), onClick: () => setDashboardFilter('ready_pickup', 'active') },
    { label: t('reworkN'), onClick: () => setDashboardFilter('rework', 'active') },
  ]);
});
dashboardSearchInput.addEventListener('focus', clearDashboardSearchBlur);
dashboardSearchInput.addEventListener('input', () => {
  dashboardSearchStamp = Date.now();
  clearTimeout(searchDebounce);
  clearDashboardSearchBlur();
  searchDebounce = setTimeout(() => {
    loadOrdersOrError().then((ok) => {
      if (ok) scheduleDashboardSearchBlur(500);
    });
  }, 220);
});
dashboardSearchInput.addEventListener('keydown', (event) => {
  if (event.key !== 'Enter') return;
  event.preventDefault();
  dashboardSearchStamp = Date.now();
  clearTimeout(searchDebounce);
  clearDashboardSearchBlur();
  loadOrdersOrError().then((ok) => {
    if (ok) scheduleDashboardSearchBlur(0);
  });
});

function onLangChange() { updatePageTitle(); renderAlerts(); renderList(); }

function updatePageTitle() {
  const title = document.getElementById('pageTitle');
  if (title) {
    title.dataset.i18n = viewMode === 'archive' ? 'archivedOrdersTitle' : 'orderOverview';
    title.textContent = viewMode === 'archive' ? t('archivedOrdersTitle') : t('orderOverview');
  }
}

function loadOrdersOrError() {
  const seq = ++dashboardLoadSeq;
  const shouldBlock = !firstLoad;
  const run = async () => {
    try {
      await loadOrders(seq);
      return true;
    } catch (err) {
      if (seq !== dashboardLoadSeq) return false;
      document.getElementById('list').innerHTML = errorState(err.message, t('retry'), loadOrdersOrError);
      toast(err.message, { type: 'danger' });
      return false;
    }
  };
  return shouldBlock ? withGlobalLoader(run, { minMs: 260 }) : run();
}

if (pageAllowed) {
  injectBossNav('orders');
  bindOrderListGestures();
  renderFilterState();
  updatePageTitle();
  loadOrdersOrError();
  window.addEventListener('offline', () => toast(t('networkError'), { type: 'danger' }));
}
</script>
</body>
</html>
