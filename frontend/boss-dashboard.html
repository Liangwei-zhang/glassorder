<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Orders</title>
<link rel="stylesheet" href="shared.css?v=20260520-customer-quick">
</head>
<body>

<div class="topbar">
  <div class="topbar-title" id="pageTitle" data-i18n="orderOverview">订单总览</div>
  <button class="logout-btn" onclick="logout()" data-i18n="logout">退出</button>
</div>

<div class="center-col page-pad-bottom" style="padding: 16px;">
  <div id="alerts"></div>

  <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px;">
    <div class="stat-tile">
      <div id="stat-total" class="num-big">-</div>
      <div class="num-label" data-i18n="orderTotal">订单总数</div>
    </div>
    <div class="stat-tile">
      <div id="stat-prod" class="num-big" style="color: var(--warn);">-</div>
      <div class="num-label" data-i18n="statusInProduction">生产中</div>
    </div>
    <div class="stat-tile">
      <div id="stat-pickup" class="num-big" style="color: var(--info);">-</div>
      <div class="num-label" data-i18n="pickupReady">待取货</div>
    </div>
    <div class="stat-tile">
      <div id="stat-rework" class="num-big" style="color: var(--danger);">-</div>
      <div class="num-label" data-i18n="reworkN">待补片</div>
    </div>
  </div>

  <div style="display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px;">
    <a class="btn filter-btn" id="archiveFilter" href="boss-dashboard.html?archived=1" style="padding: 8px 14px; min-height: 0; text-decoration:none;" data-i18n="archivedOrdersTitle">归档订单</a>
    <button class="btn filter-btn" data-filter="all" style="padding: 8px 14px; min-height: 0;" data-i18n="all">全部</button>
    <button class="btn filter-btn" data-filter="rush" style="padding: 8px 14px; min-height: 0;" data-i18n="filterRush">🔥 加急</button>
    <button class="btn filter-btn" data-filter="overdue" style="padding: 8px 14px; min-height: 0;" data-i18n="filterOverdue">⏰ 逾期</button>
    <button class="btn filter-btn" data-filter="in_production" style="padding: 8px 14px; min-height: 0;" data-i18n="statusInProduction">生产中</button>
    <button class="btn filter-btn" data-filter="ready_pickup" style="padding: 8px 14px; min-height: 0;" data-i18n="statusReadyPickup">可取货</button>
  </div>

  <input class="form-input" id="search" data-i18n-placeholder="searchPlaceholder" placeholder="搜索订单号 / 公司名" style="margin-bottom: 12px;">
  <div id="list" class="card" style="padding: 0; overflow: hidden;"></div>
</div>

<a class="fab" href="boss-new-order.html" aria-label="new order">+</a>

<script src="js/api.js?v=20260520-customer-quick"></script>
<script src="js/i18n.js?v=20260520-customer-quick"></script>
<script>
const pageAllowed = requireRolePage('boss');
const archiveMode = new URLSearchParams(location.search).get('archived') === '1';
let currentFilter = 'all';
let allOrders = [];
let firstLoad = true;
let searchDebounce = null;

const SCROLL_KEY = 'gd_scroll';
window.addEventListener('beforeunload', () => {
  sessionStorage.setItem(SCROLL_KEY, String(window.scrollY || 0));
});

async function loadOrders() {
  updatePageTitle();
  const q = document.getElementById('search').value.trim();
  const params = new URLSearchParams({ limit: '100' });
  if (archiveMode) params.set('archived', '1');
  if (currentFilter === 'rush') params.set('priority', 'rush');
  else if (currentFilter !== 'all' && currentFilter !== 'overdue') params.set('status', currentFilter);
  if (q) params.set('search', q);
  if (firstLoad) {
    document.getElementById('list').innerHTML = skeletonRows(5);
  }
  const data = await api('/api/orders?' + params.toString());
  allOrders = currentFilter === 'overdue' ? data.orders.filter(isOverdue) : data.orders;
  renderStats(data.orders);
  renderAlerts(data.orders);
  renderList();
  if (firstLoad) {
    firstLoad = false;
    const y = Number(sessionStorage.getItem(SCROLL_KEY) || 0);
    if (y > 0) {
      requestAnimationFrame(() => window.scrollTo({ top: y, behavior: 'auto' }));
      sessionStorage.removeItem(SCROLL_KEY);
    }
  }
}

function renderStats(orders) {
  document.getElementById('stat-total').textContent = orders.length;
  document.getElementById('stat-prod').textContent = orders.filter(o => o.status === 'in_production').length;
  document.getElementById('stat-pickup').textContent = orders.filter(o => o.status === 'ready_pickup').length;
  document.getElementById('stat-rework').textContent = orders.reduce((sum, o) => sum + reworkCount(o), 0);
}

function renderAlerts(orders) {
  const box = document.getElementById('alerts');
  const reworkSum = orders.reduce((sum, o) => sum + reworkCount(o), 0);
  const overdueOrders = orders.filter(isOverdue);
  let html = '';
  if (reworkSum > 0) {
    html += `<div class="card" style="background:var(--danger-soft); color:var(--danger-text); margin-bottom: 10px; display:flex; align-items:center; gap:12px;">
      <span class="dot dot-rework" style="width:10px; height:10px;"></span>
      <div style="flex:1;"><b>${esc(tn('reworkAlertN', { n: reworkSum }))}</b><div style="font-size:12px; opacity:.8;">${esc(t('reworkAlertSub'))}</div></div>
    </div>`;
  }
  if (overdueOrders.length > 0) {
    html += `<div class="card" style="background:var(--warn-soft); color:var(--warn-text); margin-bottom: 10px; display:flex; align-items:center; gap:12px;">
      <span class="dot dot-hold" style="width:10px; height:10px;"></span>
      <div style="flex:1;"><b>${esc(tn('overdueAlertN', { n: overdueOrders.length }))}</b><div style="font-size:12px; opacity:.8;">${overdueOrders.map(o => '#' + esc(o.order_number)).join(', ')}</div></div>
    </div>`;
  }
  box.innerHTML = html;
}

function renderList() {
  const el = document.getElementById('list');
  if (allOrders.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-3); margin-bottom:10px;" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="2"></rect>
        <line x1="3" y1="9" x2="21" y2="9"></line>
        <line x1="9" y1="21" x2="9" y2="9"></line>
      </svg>
      <div>${esc(archiveMode ? t('noArchivedOrders') : t('noOrdersMatch'))}</div>
      <a class="btn btn-primary cta" href="${archiveMode ? 'boss-dashboard.html' : 'boss-new-order.html'}" style="text-decoration:none;">${esc(archiveMode ? t('viewActiveOrders') : t('newOrderCta'))}</a>
    </div>`;
    return;
  }
  el.innerHTML = allOrders.map(o => {
    const pct = orderProgress(o);
    const rw = reworkCount(o);
    const overdue = isOverdue(o);
    const pctClass = o.priority === 'rush' ? 'rush' : (pct === 100 ? 'done' : '');
    return `
      <a class="row" href="boss-order-detail.html?id=${o.id}" style="flex-direction: column; align-items: stretch;">
        <div style="display:flex; align-items:center; gap: 10px; width:100%;">
          <div style="flex:1;">
            <div class="row-title">
              ${orderTitle(o)}
              ${o.priority === 'rush' ? `<span class="badge badge-rush" style="margin-left:6px;">${esc(t('badgeRush'))}</span>` : ''}
              ${rw > 0 ? `<span class="badge badge-rework" style="margin-left:6px;">${esc(tn('badgeReworkN', { n: rw }))}</span>` : ''}
              ${overdue ? `<span class="badge" style="background: var(--warn-soft); color: var(--warn-text); margin-left:6px;">${esc(t('badgeOverdue'))}</span>` : ''}
            </div>
            <div class="row-sub">${esc(o.project_name || '')} · ${esc(tn('piecesShortN', { n: Number(o.total_pieces || 0) }))} · ${esc(t('plan'))} ${esc(o.deadline || t('notSet'))}</div>
          </div>
          ${statusBadge(o)}
        </div>
        <div style="display:flex; align-items:center; gap: 8px; margin-top: 10px; width:100%;">
          <div class="progress" style="flex:1;"><div class="progress-fill ${pctClass}" style="width:${pct}%;"></div></div>
          <div style="font-size:12px; color: var(--text-2); width: 36px; text-align: right;">${pct}%</div>
        </div>
      </a>`;
  }).join('');
}

document.querySelectorAll('[data-filter]').forEach(b => {
  b.addEventListener('click', () => {
    if (archiveMode && b.dataset.filter === 'all') {
      location.href = 'boss-dashboard.html';
      return;
    }
    currentFilter = b.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    loadOrdersOrError();
  });
});
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    loadOrdersOrError();
  }, 220);
});

function onLangChange() { updatePageTitle(); renderAlerts(allOrders); renderList(); }

function updatePageTitle() {
  const title = document.getElementById('pageTitle');
  if (title) {
    title.dataset.i18n = archiveMode ? 'archivedOrdersTitle' : 'orderOverview';
    title.textContent = archiveMode ? t('archivedOrdersTitle') : t('orderOverview');
  }
}

function loadOrdersOrError() {
  loadOrders().catch(err => {
    document.getElementById('list').innerHTML = errorState(err.message, t('retry'), loadOrdersOrError);
    toast(err.message, { type: 'danger' });
  });
}

if (pageAllowed) {
  injectBossNav('orders');
  const archiveLink = document.getElementById('archiveFilter');
  archiveLink.classList.toggle('active', archiveMode);
  archiveLink.href = archiveMode ? 'boss-dashboard.html' : 'boss-dashboard.html?archived=1';
  document.querySelector('[data-filter="all"]').classList.toggle('active', !archiveMode);
  updatePageTitle();
  loadOrdersOrError();
  window.addEventListener('offline', () => toast(t('networkError'), { type: 'danger' }));
}
</script>
</body>
</html>
